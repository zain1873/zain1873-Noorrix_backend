[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python manage.py migrate --no-input && python manage.py createsuperuser --noinput --email=admin@noorrix.com --name=Admin || true && python manage.py set_admin_password && python manage.py collectstatic --no-input && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
