[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python manage.py migrate --no-input && python manage.py createsuperuser --noinput --email=admin@noorrix.com --name=Admin || true && python manage.py shell -c "from apps.auth.models import User; u=User.objects.filter(email='admin@noorrix.com').first(); u.set_password('Admin@123'); u.save()" && python manage.py collectstatic --no-input && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
